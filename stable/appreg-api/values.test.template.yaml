# Don't modify this file, it is only needed for the pipeline to set the image and ingressHost
java:
  image: ${IMAGE_NAME}
  ingressHost: ${SERVICE_FQDN}
  keyVaults:
    appreg: null
    appreg-kv:
      secrets:
        - name: AppInsightsInstrumentationKey
          alias: APP_INSIGHTS_INSTRUMENTATION_KEY
        - name: app-insights-connection-string
          alias: app-insights-connection-string
        - name: POSTGRES-USER
          alias: POSTGRES_USER
        - name: POSTGRES-PASS
          alias: POSTGRES_PASS
        - name: POSTGRES-HOST
          alias: POSTGRES_HOST
        - name: POSTGRES-PORT
          alias: POSTGRES_PORT
        - name: POSTGRES-DATABASE
          alias: POSTGRES_DATABASE
        - name: azure-tenant-id
          alias: AZURE_TENANT_ID
        - name: azure-client-secret
          alias: azure-client-secret
        - name: azure-app-id
          alias: AZURE_AUDIENCE_ID
        - name: CSDS-BASE-URL
          alias: CSDS_BASE_URL
        - name: CSDS-KEY-1
          alias: CSDS_KEY_1
        - name: CSDS-KEY-2
          alias: CSDS_KEY_2
