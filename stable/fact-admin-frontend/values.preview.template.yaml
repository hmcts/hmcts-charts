nodejs:
  image: ${IMAGE_NAME}
  ingressHost: ${SERVICE_FQDN}
  keyVaults:
    fact-kv:
      secrets:
        - name: session-secret
          alias: SESSION_SECRET
        - name: REDIS-V6-HOST
          alias: REDIS_HOST
        - name: REDIS-V6-PASSWORD
          alias: REDIS_PASSWORD
        - name: REDIS-V6-PORT
          alias: REDIS_PORT
        - name: bstrap-jenkins-sso-client-id
          alias: SSO_APP_REG_ID
        - name: bstrap-jenkins-sso-client-secret
          alias: SSO_APP_REG_SECRET
        - name: bstrap-devl-sso-tenant-id
          alias: SSO_APP_REG_TENANT_ID
        - name: app-insights-connection-string
          alias: APP_INSIGHTS_CONNECTION_STRING
        - name: admin-frontend-app-reg-id
          alias: FRONTEND_APP_REG_ID
        - name: bstrap-admin-frontend-client-secret
          alias: FRONTEND_APP_REG_SECRET
        - name: api-app-reg-id
          alias: API_APP_REG_ID
  environment:
    FRONTEND_URL: 'https://${SERVICE_NAME}.preview.platform.hmcts.net' # Override in Flux for Prod
