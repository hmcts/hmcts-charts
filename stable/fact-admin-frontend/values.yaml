nodejs:
  applicationPort: 3355
  cpuLimits: 500m
  cpuRequests: 100m
  memoryRequests: 256Mi
  memoryLimits: 1024Mi
  image: 'hmctsprod.azurecr.io/fact/admin-frontend:latest'
  ingressHost: fact-admin-frontend.{{ .Values.global.environment }}.platform.hmcts.net
  aadIdentityName: fact
  keyVaults:
    fact-kv:
      secrets:
        - name: session-secret
          alias: SESSION_SECRET
        - name: REDIS-V6-HOST
          alias: REDIS_HOST
        - name: REDIS-V6-PASSWORD
          alias: REDIS_PASSWORD
        - name: REDIS-V6-PORT
          alias: REDIS_PORT
        - name: bstrap-sso-client-id
          alias: SSO_APP_REG_ID
        - name: bstrap-sso-client-secret
          alias: SSO_APP_REG_SECRET
        - name: bstrap-sso-tenant-id
          alias: SSO_APP_REG_TENANT_ID
        - name: app-insights-connection-string
          alias: APP_INSIGHTS_CONNECTION_STRING
        - name: admin-frontend-app-reg-id
          alias: FRONTEND_APP_REG_ID
        - name: bstrap-admin-frontend-client-secret
          alias: FRONTEND_APP_REG_SECRET
        - name: api-app-reg-id
          alias: API_APP_REG_ID
  environment:
    DATA_API_URL: 'https://fact-data-api.{{ .Values.global.environment }}.platform.hmcts.net'
    PUBLIC_FRONTEND_URL: 'https://fact-public-frontend.{{ .Values.global.environment }}.platform.hmcts.net' # Override in Flux for Prod
    FRONTEND_URL: 'https://fact-admin-frontend.{{ .Values.global.environment }}.platform.hmcts.net' # Override in Flux for Prod

