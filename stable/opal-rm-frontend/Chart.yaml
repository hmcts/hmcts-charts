apiVersion: v2
appVersion: "1.0"
description: A Helm chart for opal-rm-frontend
name: opal-rm-frontend
home: https://github.com/hmcts/opal-rm-frontend/
version: 0.0.6
maintainers:
  - name: HMCTS Opal team
dependencies:
  - name: nodejs
    version: 3.2.1
    repository: "oci://hmctsprod.azurecr.io/helm"
  - name: redis
    version: 25.3.12
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: redis.enabled
  - name: postgresql
    version: 18.6.1
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
  - name: opal-fines-service
    version: 0.0.87
    repository: "oci://hmctsprod.azurecr.io/helm"
    condition: opal-fines-service.enabled
  - name: servicebus
    version: 1.2.2
    repository: "oci://hmctsprod.azurecr.io/helm"
    condition: opal-fines-service.enabled
