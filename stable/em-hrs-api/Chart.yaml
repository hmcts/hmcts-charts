apiVersion: v2
description: A Helm chart for Hearing Recording Service
name: em-hrs-api
home: https://github.com/hmcts/em-hrs-api
version: 2.0.3
maintainers:
  - name: HMCTS Evidence Management team
dependencies:
  - name: java
    version: 5.3.0
    repository: oci://hmctsprod.azurecr.io/helm
    condition: java.enabled
  - name: job
    version: 2.2.1
    repository: oci://hmctsprod.azurecr.io/helm
    condition: job.enabled
  - name: ccd
    version: 9.2.3
    repository: oci://hmctsprod.azurecr.io/helm
    condition: ccd.enabled
  - name: blobstorage
    alias: hrsblobstorage
    version: 2.2.3
    repository: oci://hmctsprod.azurecr.io/helm
    condition: hrsblobstorage.enabled
  - name: blobstorage
    alias: cvpblobstorage
    version: 2.2.3
    repository: oci://hmctsprod.azurecr.io/helm
    condition: cvpblobstorage.enabled
