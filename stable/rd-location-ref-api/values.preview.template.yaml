java:
  image: ${IMAGE_NAME}
  ingressHost: ${SERVICE_FQDN}
  environment:
    POSTGRES_HOST: "{{ .Release.Name }}-postgresql"
    POSTGRES_DB_NAME: "{{ .Values.postgresql.auth.database}}"
    POSTGRES_USERNAME: "{{ .Values.postgresql.auth.username}}"
    POSTGRES_PASSWORD: "{{ .Values.postgresql.auth.password}}"
    POSTGRES_PORT: "{{ .Values.postgresql.auth.port}}"
    LOCATIONS_DB: classpath:db/migration,classpath:db/postgres,classpath:db/migrationAks
    LAUNCH_DARKLY_ENV: "preview"
    LRD_S2S_AUTHORISED_SERVICES: rd_location_ref_api,payment_app,rd_caseworker_ref_api,rd_judicial_api,ccd_data,xui_webapp,prl_cos_api,sscs,sscs_bulkscan,adoption_web,civil_service,civil_general_applications,sptribs_case_api,fis_hmc_api,et_cos,iac,civil_rtl_export,pcs_api,probate_backend,finrem_case_orchestration,finrem_citizen_ui
  postgresql:
    enabled: true
    auth:
      username: dbrdlocationref
      password: dbrdlocationref
      database: dbrdlocationref
      port: 5432
  keyVaults:
    rd:
      secrets:
        - name: app-insights-connection-string
          alias: app-insights-connection-string
        - name: LD-SDK-KEY
          alias: LD_SDK_KEY
        - name: location-ref-api-s2s-secret
          alias: LOCATION_REF_API_S2S_SECRET
