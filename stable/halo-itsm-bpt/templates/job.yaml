apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-job
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      containers:
        - name: {{ .Chart.Name }}
          image: {{ .Values.job.image | quote }}
          imagePullPolicy: Always
          command:
{{ toYaml .Values.job.command | indent 12 }}
          args:
{{ toYaml .Values.job.args | indent 12 }}
          env:
{{- range $name, $value := .Values.job.environment }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
