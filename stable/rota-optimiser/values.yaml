java:
  applicationPort: 4550
  image: 'hmctsprod.azurecr.io/rota/optimiser:latest'
  ingressHost: rota-optimiser-{{ .Values.global.environment }}.service.core-compute-{{ .Values.global.environment }}.internal
  aadIdentityName: rota
  keyVaults:
    rota-shared:
      resourceGroup: rota-shared-infra
      secrets:
        - name: application-insights-connection-string
          alias: app-insights-connection-string
        - name: postgresql-fqdn
          alias: postgresql-fqdn
        - name: postgresql-admin-username
          alias: postgresql-admin-username
        - name: postgresql-admin-password
          alias: postgresql-admin-password
  environment:
    ROTA_DB_MAX_POOL_SIZE: 10
    ROTA_DB_MIN_IDLE: 2
    ROTA_DB_CONNECTION_TIMEOUT_MS: 5000
    ROTA_DB_VALIDATION_TIMEOUT_MS: 3000
    ROTA_OPTIMISER_WORKER_LEASE_DURATION: PT2M
    ROTA_OPTIMISER_WORKER_RECOVERY_INTERVAL: PT30S
    ROTA_OPTIMISER_WORKER_MAX_ATTEMPTS: 3
    ROTA_OPTIMISER_WORKER_REQUIRE_LEASE_TOKEN: false
