# Don't modify this file, it is only needed for the pipeline to set the image and ingressHost
global:
  postgresUsername: "opal-rm"
  postgresPassword: "opal-rm"
  postgresOptions: "?stringtype=unspecified"

java:
  image: ${IMAGE_NAME}
  ingressHost: ${SERVICE_FQDN}
  keyVaults:
    opal:
      secrets:
        - name: app-insights-connection-string
          alias: app-insights-connection-string
  environment:
    OPAL_RM_DB_HOST: "{{ .Release.Name }}-postgresql"
    OPAL_RM_DB_NAME: "opal-rm-db"
    OPAL_RM_DB_USERNAME: "{{ .Values.global.postgresUsername }}"
    OPAL_RM_DB_PASSWORD: "{{ .Values.global.postgresPassword }}"
    OPAL_RM_DB_PORT: "5432"
    OPAL_RM_DB_OPTIONS: "{{ .Values.global.postgresOptions }}"
    APPLICATIONINSIGHTS_ROLE_NAME: "opal-rm-service-pr-${CHANGE_ID}"

postgresql:
  enabled: true
  auth:
    username: opal-rm
    password: opal-rm
    database: opal-rm-db
  primary:
    persistence:
      enabled: false
    resourcesPreset: small
