# Attention: if you are changing values in here, please ensure you also update any corresponding files in the charts-dev-overrides directory
java:
  releaseNameOverride: '{{ .Release.Name }}'
  # Don't modify below here
  image: ${IMAGE_NAME}
  devmemoryRequests: "1Gi"
  devcpuRequests: "250m"
  devmemoryLimits: "2Gi"
  devcpuLimits: "1500m"
  ingressHost: ${SERVICE_FQDN}
  global:
    enableKeyVaults: false
  keyVaults:
    "rota-shared":
      secrets:
        - name: dummySecret
          alias: DUMMY_SECRET

  environment:
    TEST: true

  secrets:
    ROTA_API_DB_PASSWORD:
      secretRef: "postgres"
      key: PASSWORD
      disabled: false

postgresql:
  enabled: true
  flexibleserver: "rota-preview"
  setup:
    databases:
      - name: "pr-${CHANGE_ID}-rota"


  environment:
    ROTA_API_DB_HOST: "rota-preview.postgres.database.azure.com"
    ROTA_API_DB_NAME: "pr-${CHANGE_ID}-rota"
    ROTA_API_DB_USERNAME: "hmcts"
