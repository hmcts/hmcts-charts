apiVersion: v2
description: Divorce - CCD Definitions
name: div-ccd-definitions
version: 2.0.26
dependencies:
  - name: nodejs
    version: 3.2.1
    repository: 'oci://hmctsprod.azurecr.io/helm'
  - name: ccd
    version: 9.2.2
    repository: 'oci://hmctsprod.azurecr.io/helm'
    tags:
      - divorce-ccd-stack
  - name: xui-webapp
    version: ~1.0.0
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: xui-webapp.enabled
  - name: xui-mo-webapp
    version: ~1.1.6
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: xui-mo-webapp.enabled
  - name: aac-manage-case-assignment
    version: ~0.2.5
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: aac-manage-case-assignment.enabled
  - name: idam-pr
    version: 2.2.7
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: idam-pr.enabled
  - name: div-pfe
    version: 2.0.27
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: div-pfe.enabled
  - name: div-rfe
    version: 2.0.22
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: div-rfe.enabled
  - name: div-da
    version: 2.0.23
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: div-da.enabled
  - name: div-dn
    version: 2.0.19
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: div-dn.enabled
  - name: div-cos
    version: 1.5.13
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: div-cos.enabled
  - name: div-cms
    version: 2.0.11
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: div-cms.enabled
  - name: div-dgs
    version: 2.0.10
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: div-dgs.enabled
  - name: div-emca
    version: 2.0.10
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: div-emca.enabled
  - name: div-fps
    version: 3.0.10
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: div-fps.enabled
  - name: postgresql
    version: 1.1.1
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: postgres.enabled
