global:
  security:
    allowInsecureImages: true
nodejs:
  environment:
    NODE_ENV: aat
    OAUTH_CALLBACK_URL: 'https://${SERVICE_FQDN}/oauth2/callback'
    IDAM_CLIENT_ID: finrem-citizen-ui
    ENABLE_TEST_SUPPORT_ROUTES: 'true'
    RATE_LIMIT_WINDOW_MS: 900000

    # AAT IDAM endpoints
    IDAM_WEB_URL: https://hmcts-access.aat.platform.hmcts.net/login
    IDAM_END_SESSION_URL: https://hmcts-access.aat.platform.hmcts.net/o/endSession
    IDAM_TOKEN_URL: https://idam-api.aat.platform.hmcts.net/o/token
    SESSION_STORE: redis

  # Don't modify below here
  image: ${IMAGE_NAME}
  ingressHost: ${SERVICE_FQDN}
  devmemoryRequests: 1Gi
  devmemoryLimits: 2Gi

  keyVaults:
    finrem:
      secrets:
        - finrem-system-update-username
        - finrem-system-update-password
        - finrem-citizen-ui-idam-client-secret
        - finrem-citizen-s2s-client-secret
        - name: app-insights-connection-string
          alias: app-insights-connection-string
        - finrem-citizen-ui-redis-connection-string
        - session-secret
        - name: gov-uk-notification-key
          alias: GOVUK_NOTIFY_API_KEY
        - name: document-upload-email-template-id
          alias: FINREM_CITIZEN_UI_TEMPLATE_ID
