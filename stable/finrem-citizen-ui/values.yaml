nodejs:
  applicationPort: 3100
  aadIdentityName: finrem
  ingressHost: finrem-citizen-ui.{{ .Values.global.environment }}.platform.hmcts.net
  image: 'hmctsprod.azurecr.io/finrem/citizen-ui:latest'
  memoryRequests: 1024Mi
  cpuRequests: 2500m
  memoryLimits: 2048Mi
  cpuLimits: 2500m
  readinessDelay: 130
  livenessDelay: 130

  keyVaults:
    finrem:
      secrets:
        - name: app-insights-connection-string
          alias: app-insights-connection-string
        - finrem-system-update-username
        - finrem-system-update-password
        - finrem-citizen-ui-idam-client-secret
        - finrem-citizen-s2s-client-secret
        - finrem-citizen-ui-redis-connection-string
        - session-secret
  autoscaling:
    enabled: true
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

  environment:
    SERVICE_AUTH_PROVIDER_URL: 'http://rpe-service-auth-provider-{{ .Values.global.environment }}.service.core-compute-{{ .Values.global.environment }}.internal'
    IDAM_WEB_URL: 'https://idam-web-public.{{ .Values.global.environment }}.platform.hmcts.net/login'
    IDAM_TOKEN_URL: 'https://idam-api.{{ .Values.global.environment }}.platform.hmcts.net/o/token'
    CCD_URL: 'http://ccd-data-store-api-{{ .Values.global.environment }}.service.core-compute-{{ .Values.global.environment }}.internal'
    CASE_DOCUMENT_MANAGEMENT_URL: 'http://ccd-case-document-am-api-{{ .Values.global.environment }}.service.core-compute-{{ .Values.global.environment }}.internal'
    ORCHESTRATION_SERVICE_URL: 'http://finrem-cos-{{ .Values.global.environment }}.service.core-compute-{{ .Values.global.environment }}.internal'
    IDAM_CLIENT_ID: 'finrem-citizen-ui'
    IDAM_END_SESSION_URL: 'https://hmcts-access.{{ .Values.global.environment }}.platform.hmcts.net/o/endSession'
    REDIS_EXPIRE_IN_DAYS: 180
    SESSION_STORE: 'redis'
    SECURE_COOKIE: 'true'
    RATE_LIMIT_WINDOW_MS: 900000

redis:
  enabled: false
