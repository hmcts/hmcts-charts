nodejs:
  applicationPort: 3100
  aadIdentityName: courtfines
  ingressHost: courtfines.justice.gov.uk
  image: 'hmctssbox.azurecr.io/courtfines/app:latest'
  keyVaults:
    courtfines:
      secrets:
        - app-EPDQ-SHAIN
        - app-SESSION-SECRET
        - app-POSTGRES-USER
        - app-POSTGRES-PASS
        - app-POSTGRES-HOST
        - app-POSTGRES-PORT
        - app-POSTGRES-DATABASE
        - app-insights-connection-string
        - app-SPA-ACCESS-KEY
        - app-SPA-SECRET-KEY
  environment:
    ALLOW_CONFIG_MUTATIONS: true
    NODE_ENV: 'production'
    TESTVAR: 'testvalue'
    LOG_LEVEL: 'DEBUG'
    MAINTENANCE_BANNER_ENABLED: 'false'
    MAINTENANCE_BANNER_MESSAGE: 'The HMCTS Online payments service will be unavailable from 10pm on Friday 31 July to 8am on Saturday 1 August for an essential upgrade.'
    PAYMENTS_PAUSED: 'false'
