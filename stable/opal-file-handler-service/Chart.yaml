apiVersion: v2
appVersion: "1.0"
description: A Helm chart for opal-file-handler-service App
name: opal-file-handler-service
home: https://github.com/hmcts/opal-file-handler-service
version: 0.0.11
maintainers:
  - name: HMCTS opal team
dependencies:
  - name: java
    version: 5.3.0
    repository: 'oci://hmctsprod.azurecr.io/helm'
  - name: blobstorage
    alias: bais-emulator
    version: 2.2.3-beta
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: bais-emulator.enabled
  - name: hmcts-redis
    version: 1.0.0
    repository: "oci://hmctsprod.azurecr.io/helm"
    condition: hmcts-redis.enabled
  - name: blobstorage
    version: 2.2.3
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: blobstorage.enabled
  - name: job
    alias: bt-eckoh-report
    version: 2.2.1
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: bt-eckoh-report.enabled
  - name: job
    alias: caps-report
    version: 2.2.1
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: caps-report.enabled
  - name: job
    alias: natwest-transfer
    version: 2.2.1
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: natwest-transfer.enabled
  - name: job
    alias: allpay-file-transfer
    version: 2.2.1
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: allpay-file-transfer.enabled
  - name: job
    alias: barclaycard-transfer
    version: 2.2.1
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: barclaycard-transfer.enabled
  - name: job
    alias: bt-eckoh-transfer
    version: 2.2.1
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: bt-echko-transfer.enabled
  - name: job
    alias: dwp-transfer
    version: 2.2.1
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: dwp-transfer.enabled
  - name: job
    alias: jacobs-transfer
    version: 2.2.1
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: jacobs-transfer.enabled
  - name: job
    alias: cder-transfer
    version: 2.2.1
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: cder-transfer.enabled
  - name: job
    alias: marston-transfer
    version: 2.2.1
    repository: 'oci://hmctsprod.azurecr.io/helm'
    condition: marston-transfer.enabled