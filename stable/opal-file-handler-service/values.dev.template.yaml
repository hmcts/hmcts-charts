global:
  postgresDatabase: "opal-file-handler-db"
  postgresUsername: "javapostgres"
  postgresOptions: "?stringtype=unspecified"
  postgresPassword: "javapassword"
java:
  image: ${IMAGE_NAME}
  ingressHost: ${SERVICE_FQDN}
  secrets:
    FILE_STORE_STORAGE_ACCOUNT_NAME:
      secretRef: storage-account-{{ .Release.Name }}-blobstorage
      key: storage_account_name
    FILE_STORE_STORAGE_URL:
      secretRef: storage-secret-{{ .Release.Name }}-blobstorage
      key: blobEndpoint
    FILE_STORE_STORAGE_KEY:
      secretRef: storage-secret-{{ .Release.Name }}-blobstorage
      key: accessKey
  keyVaults:
    opal:
      secrets:
        - name: app-insights-connection-string
          alias: app-insights-connection-string
        - name: launch-darkly-sdk-key
          alias: LAUNCH_DARKLY_SDK_KEY
        - name: AzureADTenantId
          alias: AAD_TENANT_ID
        - name: AzureADClientId
          alias: AAD_CLIENT_ID
        - name: AzureADClientSecret
          alias: AAD_CLIENT_SECRET
  environment:
    REDIS_CONNECTION_STRING: redis://${SERVICE_NAME}-hmcts-redis-master:6379
    OPAL_FILE_HANDLER_DB_HOST: "{{ .Release.Name }}-postgresql"
    OPAL_FILE_HANDLER_DB_NAME: "{{ .Values.global.postgresDatabase}}"
    OPAL_FILE_HANDLER_DB_USERNAME: "{{ .Values.global.postgresUsername}}"
    OPAL_FILE_HANDLER_DB_PASSWORD: "{{ .Values.global.postgresPassword}}"
    OPAL_FILE_HANDLER_DB_OPTIONS: "{{ .Values.global.postgresOptions}}"
    RUN_DB_MIGRATION_ON_STARTUP: true
    OPAL_USER_SERVICE_API_URL: "https://opal-user-service.staging.platform.hmcts.net/"
    TESTING_SUPPORT_ENDPOINTS_ENABLED: true
    LAUNCH_DARKLY_ENABLED: false
    FLYWAY_LOCATIONS: classpath:db/migration/ddl, classpath:db/migration/data/allEnvs, classpath:db/migration/data/nle, classpath:db/migration/data/dev
    APPLICATIONINSIGHTS_ROLE_NAME: "opal-file-handler-service-pr-${CHANGE_ID}"
    DEFAULT_APP_MODE: ${APP_MODE}
  postgresql:
    enabled: true
    primary:
      initdb:
        scripts:
          init.sql: |-
            CREATE DATABASE "opal-logging-db" OWNER javapostgres ENCODING = 'UTF-8' CONNECTION LIMIT = -1;
            CREATE DATABASE "opal-user-db" OWNER javapostgres ENCODING = 'UTF-8' CONNECTION LIMIT = -1;
    auth:
      username: javapostgres
      password: javapassword
      database: opal-file-handler-db
blobstorage:
  enabled: true
  azureName: "opalfilesapr${CHANGE_ID}"
  releaseNameOverride: ${SERVICE_NAME}-blobstorage
  resourceGroup: "opal-aso-dev-rg"
  setup:
    containers:
      - bteckoh-report
      - caps-report
bais-emulator:
  enabled: true
  azureName: "opalfilebaisapr${CHANGE_ID}"
  releaseNameOverride: ${SERVICE_NAME}-bais-blobstorage
  resourceGroup: "opal-aso-dev-rg"
  setup:
    isSftpEnabled: true
    isHnsEnabled: true
    containers:
      - bteckoh-report
      - caps-report
bt-eckoh-report:
  image: ${IMAGE_NAME}
  environment:
    REDIS_CONNECTION_STRING: redis://${SERVICE_NAME}-hmcts-redis-master:6379
    OPAL_FILE_HANDLER_DB_HOST: "{{ .Release.Name }}-postgresql"
    OPAL_FILE_HANDLER_DB_NAME: "{{ .Values.global.postgresDatabase}}"
    OPAL_FILE_HANDLER_DB_USERNAME: "{{ .Values.global.postgresUsername}}"
    OPAL_FILE_HANDLER_DB_PASSWORD: "{{ .Values.global.postgresPassword}}"
    OPAL_FILE_HANDLER_DB_OPTIONS: "{{ .Values.global.postgresOptions}}"
    RUN_DB_MIGRATION_ON_STARTUP: false
    OPAL_FRONTEND_URL: https://opal-frontend.staging.apps.hmcts.net
    TESTING_SUPPORT_ENDPOINTS_ENABLED: false
    LAUNCH_DARKLY_ENABLED: false
    OPAL_COMMON_CONTENT_DIGEST_RESPONSE_ENFORCE: false
    FLYWAY_LOCATIONS: classpath:db/migration/ddl, classpath:db/migration/data/allEnvs, classpath:db/migration/data/nle, classpath:db/migration/data/dev
    RELEASE_1A_ENABLED: true

