java:
  image: ${IMAGE_NAME}
  ingressHost: ${SERVICE_FQDN}
  environment:
    OPAL_USER_SERVICE_API_URL: https://opal-user-service.staging.platform.hmcts.net
    TESTING_SUPPORT_ENDPOINTS_ENABLED: true
    FLYWAY_LOCATIONS: classpath:db/migration/ddl, classpath:db/migration/data/allEnvs, classpath:db/migration/data/nle, classpath:db/migration/data/stg

bt-eckoh-report:
  releaseNameOverride: opal-file-handler-service-stg-bt-eckoh-report
  image: ${IMAGE_NAME}
  environment:
    OPAL_FRONTEND_URL: https://opal-frontend-staging.staging.apps.hmcts.net
    TESTING_SUPPORT_ENDPOINTS_ENABLED: false
    RELEASE_1A_ENABLED: true
    OPAL_COMMON_CONTENT_DIGEST_REQUEST_AUTO_GENERATE: true
    FLYWAY_LOCATIONS: classpath:db/migration/ddl, classpath:db/migration/data/allEnvs, classpath:db/migration/data/nle, classpath:db/migration/data/stg

